# Site settings
title: DenkKern
subtitle: Decision Intelligence Platform
email: hello@denkern.com
description: >-
  Help organizations make better operational decisions by combining fragmented information,
  evaluating possible actions, explaining trade-offs, and continuously learning from outcomes.
url: "https://yourusername.github.io"
baseurl: "/denkern"
repository: "yourusername/denkern"

# Theme
remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "dark"

# Site author
author:
  name: DenkKern Team
  avatar: "/assets/images/logo.svg"
  bio: Decision Intelligence Platform
  location: ""
  email: hello@denkern.com
  links:
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://linkedin.com"
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com"

# Reading Files
include:
  - .htaccess
  - _pages

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: UTC

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
